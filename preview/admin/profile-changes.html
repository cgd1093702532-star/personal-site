<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>主页变更审核 · 英雄广场管理后台</title>
  <link rel="stylesheet" href="../assets/preview.css">
  <link rel="stylesheet" href="../assets/admin.css">
</head>
<body data-admin-page="profile-changes" data-admin-title="主页变更审核" data-admin-breadcrumb="管理中心 / 主页变更审核">
  <div id="admin-page-root">
    <p id="pc-admin-hint" class="admin-page-tip"></p>
    <div class="admin-tabs admin-tabs--pills">
      <button type="button" class="admin-tabs__item is-active" data-pc-status="pending">待审核</button>
      <button type="button" class="admin-tabs__item" data-pc-status="approved">已通过</button>
      <button type="button" class="admin-tabs__item" data-pc-status="rejected">已驳回</button>
      <button type="button" class="admin-tabs__item" data-pc-status="">全部</button>
    </div>
    <div class="admin-action-bar" style="margin:12px 0 0">
      <div class="admin-action-bar__left" style="display:flex;gap:8px;flex-wrap:wrap">
        <button type="button" class="admin-btn admin-btn--outline-primary" id="pc-batch-delete">批量删除</button>
      </div>
    </div>
    <div class="admin-card">
      <div class="admin-card__body admin-card__body--compact">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th class="admin-table__check">
                  <input type="checkbox" id="pc-check-all" aria-label="全选" />
                </th>
                <th>英雄</th>
                <th>变更类型</th>
                <th>提交时间</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="pc-admin-tbody"><tr><td colspan="6" class="admin-table__empty">加载中…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="pc-admin-detail" class="admin-card admin-detail-panel" hidden><div class="admin-card__body"></div></div>
  </div>
  <script src="../assets/admin-layout.js"></script>
  <script src="../assets/db-client.js"></script>
  <script src="../assets/profile-changes-admin-preview.js"></script>
</body>
</html>
