<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>评价管理 · 英雄广场管理后台</title>
  <link rel="stylesheet" href="../assets/preview.css">
  <link rel="stylesheet" href="../assets/admin.css">
</head>
<body data-admin-page="reviews" data-admin-title="评价列表" data-admin-breadcrumb="供需管理 / 评价列表">
  <div id="admin-page-root">
    <p id="reviews-admin-hint" class="admin-page-tip"></p>
    <div class="admin-card">
      <div class="admin-card__body admin-card__body--compact">
        <div class="admin-filter">
          <div class="admin-form-item"><label class="admin-form-item__label">关键词</label><input id="reviews-admin-search" class="admin-input" type="search" placeholder="内容 / 评价人 / 标题" /></div>
          <div class="admin-filter__actions">
            <button type="button" class="admin-btn admin-btn--primary" id="reviews-admin-search-btn">查询</button>
            <button type="button" class="admin-btn" id="reviews-admin-reset-btn">重置</button>
          </div>
        </div>
      </div>
    </div>
    <div class="admin-tabs admin-tabs--pills">
      <button type="button" class="admin-tabs__item is-active" data-review-status="">全部</button>
      <button type="button" class="admin-tabs__item" data-review-status="visible">正常</button>
      <button type="button" class="admin-tabs__item" data-review-status="hidden">已隐藏</button>
      <button type="button" class="admin-tabs__item" data-review-status="deleted">已删除</button>
    </div>
    <div class="admin-card">
      <div class="admin-card__body admin-card__body--compact">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>评价人</th><th>英雄</th><th>场景</th><th>评分</th><th>内容</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="reviews-admin-tbody"><tr><td colspan="8" class="admin-table__empty">加载中…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/admin-layout.js"></script>
  <script src="../assets/db-client.js"></script>
  <script src="../assets/reviews-admin-preview.js"></script>
</body>
</html>
