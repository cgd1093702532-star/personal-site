<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英雄广场 · 离线演示</title>
  <style>
    :root {
      --primary: #1b579c;
      --text: #222;
      --text2: #5c6c7a;
      --bg: #fafafa;
      --divider: #e1e5e8;
      --device-w: 380px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", -apple-system, sans-serif;
      background: #eef2f6;
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 40px;
    }
    .page-header { max-width: 960px; margin: 0 auto 20px; }
    .page-header h1 { font-size: 22px; margin-bottom: 8px; }
    .page-header p { font-size: 14px; color: var(--text2); line-height: 1.6; }
    .layout {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .phone {
      background: #1c1c1e;
      border-radius: 40px;
      padding: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .phone__screen {
      background: #fff;
      border-radius: 32px;
      overflow: hidden;
      min-height: 640px;
      display: flex;
      flex-direction: column;
    }
    .nav {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--divider);
      font-weight: 600;
      font-size: 16px;
      position: relative;
    }
    .nav__back {
      position: absolute;
      left: 12px;
      font-size: 24px;
      cursor: pointer;
      border: none;
      background: none;
      line-height: 1;
    }
    .content { flex: 1; overflow-y: auto; background: var(--bg); }
    .tabbar {
      display: flex;
      border-top: 1px solid var(--divider);
      height: 50px;
      background: #fff;
    }
    .tabbar button {
      flex: 1;
      border: none;
      background: none;
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
    }
    .tabbar button.active { color: var(--primary); font-weight: 600; }
    .profile-user { padding: 16px; background: #fff; }
    .profile-user__name { font-size: 18px; font-weight: 600; }
    .profile-user__meta { margin-top: 6px; font-size: 13px; color: var(--text2); }
    .cert-hero { color: var(--primary); font-weight: 600; }
    .cert-none { color: var(--text2); }
    .dev-toggle {
      margin: 8px 16px;
      width: calc(100% - 32px);
      padding: 8px;
      font-size: 12px;
      border: 1px dashed var(--divider);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text2);
    }
    .cta {
      margin: 12px 16px;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      text-align: center;
    }
    .cta--pending { background: #fff8e6; border: 1px solid #ffe08a; }
    .cta p { font-size: 13px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
    .btn-primary {
      display: inline-block;
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .hero-center { padding: 16px; }
    .hero-center h3 { font-size: 15px; margin-bottom: 12px; }
    .shortcuts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .shortcuts button {
      padding: 12px 6px;
      border: 1px solid var(--divider);
      border-radius: 10px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
    }
    .form { padding: 12px 16px 80px; }
    .field { margin-bottom: 14px; }
    .label { font-size: 13px; margin-bottom: 6px; display: block; }
    .label::after { content: " *"; color: #c00; }
    .label.optional::after { content: ""; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--divider);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    textarea { min-height: 72px; resize: vertical; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 6px 12px;
      border: 1px solid var(--divider);
      border-radius: 16px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .tag.on { background: var(--primary); color: #fff; border-color: var(--primary); }
    .apply-footer {
      position: sticky;
      bottom: 0;
      padding: 12px 16px;
      background: var(--bg);
      border-top: 1px solid var(--divider);
    }
    .apply-footer label { display: flex; gap: 8px; font-size: 12px; margin-bottom: 10px; align-items: flex-start; }
    .success {
      padding: 48px 24px;
      text-align: center;
      background: #fff;
      min-height: 400px;
    }
    .success__icon {
      width: 64px; height: 64px; line-height: 64px;
      background: #d4edda; color: #155724;
      border-radius: 50%; font-size: 28px; margin: 0 auto 16px;
    }
    .success h2 { font-size: 18px; margin-bottom: 8px; }
    .success p { font-size: 14px; color: var(--text2); line-height: 1.6; }
    .admin {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
    }
    .admin h2 { font-size: 18px; margin-bottom: 4px; }
    .admin .hint { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid var(--divider); padding: 8px; text-align: left; }
    th { background: var(--bg); }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .badge--pending { background: #fff3cd; color: #856404; }
    .badge--approved { background: #d4edda; color: #155724; }
    .admin-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn-sm {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--divider);
      background: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-sm--ok { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-sm--danger { background: #dc3545; color: #fff; border-color: #dc3545; }
    .toast {
      position: fixed;
      left: 50%; bottom: 32px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.82);
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 999;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>英雄广场 · 离线演示</h1>
    <p>
      双击本文件即可在浏览器中打开，<strong>无需安装、无需联网、无需启动服务</strong>。
      演示「申请成为英雄 → 后台审核 → 个人中心状态变化」完整流程。
      数据保存在本机浏览器，刷新后仍保留（可点「重置演示」清空）。
    </p>
  </div>

  <div class="layout">
    <div>
      <div class="panel-title">小程序预览</div>
      <div class="phone">
        <div class="phone__screen">
          <div class="nav" id="phone-nav">
            <button type="button" class="nav__back hidden" id="nav-back" aria-label="返回">‹</button>
            <span id="nav-title">个人中心</span>
          </div>
          <div class="content" id="phone-content"></div>
          <div class="tabbar" id="phone-tabbar">
            <button type="button" data-screen="home">首页</button>
            <button type="button" data-screen="heroes">英雄</button>
            <button type="button" data-screen="mall">商城</button>
            <button type="button" data-screen="profile" class="active">我的</button>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel-title">管理后台 · 英雄审核</div>
      <div class="admin">
        <h2>英雄管理</h2>
        <p class="hint">在右侧模拟后台操作；批准后左侧个人中心会变为「已认证」。</p>
        <table>
          <thead>
            <tr><th>姓名</th><th>手机号</th><th>项目</th><th>状态</th></tr>
          </thead>
          <tbody id="admin-tbody">
            <tr><td colspan="4" style="text-align:center;color:#999">暂无申请</td></tr>
          </tbody>
        </table>
        <div class="admin-actions" id="admin-actions"></div>
        <div class="admin-actions">
          <button type="button" class="btn-sm" id="btn-reset">重置演示</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
(function () {
  const STORAGE_KEY = 'hero-plaza-offline-demo';
  const SMS_CODE = '666666';

  let state = loadState();
  let currentScreen = 'profile';
  let previewOverride = null;
  let sentSms = false;
  let selectedProjects = [];
  let selectedYears = '';

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return { status: 'none', application: null };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    renderAdmin();
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2200);
  }

  function displayStatus() {
    if (previewOverride === 'approved') return 'approved';
    if (previewOverride === 'none') return state.status === 'pending' ? 'pending' : 'none';
    return state.status;
  }

  function setNav(title, showBack) {
    document.getElementById('nav-title').textContent = title;
    document.getElementById('nav-back').classList.toggle('hidden', !showBack);
  }

  function renderProfile() {
    setNav('个人中心', false);
    const status = displayStatus();
    const isHero = status === 'approved';
    const pending = status === 'pending';
    const root = document.getElementById('phone-content');
    root.innerHTML = `
      <div class="profile-user">
        <div class="profile-user__name">航海用户</div>
        <div class="profile-user__meta">
          普通会员 · <span class="${isHero ? 'cert-hero' : 'cert-none'}">${isHero ? '已认证英雄' : '未认证'}</span>
        </div>
      </div>
      <button type="button" class="dev-toggle" id="preview-toggle">
        预览：切换为${isHero ? '未认证' : '已认证'}状态
      </button>
      ${isHero ? `
        <div class="hero-center">
          <h3>英雄中心</h3>
          <div class="shortcuts">
            <button type="button">发布招募</button>
            <button type="button">我的招募</button>
            <button type="button">我的课程</button>
          </div>
        </div>` : `
        <div class="cta ${pending ? 'cta--pending' : ''}">
          <p>${pending ? '认证申请审核中，请耐心等待' : '成为英雄，发布赛事招募，开启您的水上教育事业'}</p>
          <button type="button" class="btn-primary" id="btn-apply">${pending ? '查看审核进度' : '申请成为英雄'}</button>
        </div>`}
    `;
    document.getElementById('preview-toggle').onclick = () => {
      previewOverride = isHero ? 'none' : 'approved';
      renderProfile();
    };
    document.getElementById('btn-apply')?.addEventListener('click', () => {
      const api = state.status;
      if (api === 'approved') { toast('您已是认证英雄'); previewOverride = 'approved'; renderProfile(); return; }
      if (api === 'pending') { goSubmitted(); return; }
      goApply();
    });
  }

  function goApply() {
    currentScreen = 'apply';
    selectedProjects = [];
    selectedYears = '';
    sentSms = false;
    setNav('申请成为英雄', true);
    const root = document.getElementById('phone-content');
    root.innerHTML = `
      <div class="form">
        <div class="field"><label class="label">姓名</label><input id="f-name" placeholder="请输入"></div>
        <div class="field"><label class="label">手机号</label><input id="f-phone" type="tel" maxlength="11" placeholder="请输入"></div>
        <div class="field"><label class="label">验证码</label>
          <div style="display:flex;gap:8px">
            <input id="f-sms" maxlength="6" placeholder="666666" style="flex:1">
            <button type="button" class="btn-sm" id="btn-sms">获取验证码</button>
          </div>
        </div>
        <div class="field"><label class="label">项目类型</label>
          <div class="tags" id="f-projects">
            ${['帆船','皮划艇','桨板','潜水'].map(t => `<button type="button" class="tag" data-v="${t}">${t}</button>`).join('')}
          </div>
        </div>
        <div class="field"><label class="label">常驻城市</label><input id="f-city" placeholder="请输入"></div>
        <div class="field"><label class="label">教练资质等级</label>
          <select id="f-cert"><option value="">请选择</option><option>省级教练</option><option>ACA认证</option></select>
        </div>
        <div class="field"><label class="label">从业年限</label>
          <div class="tags" id="f-years">
            ${['1-3年','3-5年','5-10年','10年+'].map(t => `<button type="button" class="tag" data-v="${t}">${t}</button>`).join('')}
          </div>
        </div>
        <div class="field"><label class="label">详细介绍</label><textarea id="f-bio" placeholder="请输入"></textarea></div>
        <div class="apply-footer">
          <label><input type="checkbox" id="f-agree"> 我已阅读并同意相关协议</label>
          <button type="button" class="btn-primary" style="width:100%" id="btn-submit">提交申请</button>
        </div>
      </div>`;
    document.getElementById('btn-sms').onclick = () => {
      const phone = document.getElementById('f-phone').value.trim();
      if (!/^1\d{10}$/.test(phone)) { toast('请填写正确的手机号'); return; }
      sentSms = true;
      toast('验证码已发送（演示码：666666）');
    };
    document.getElementById('f-projects').onclick = (e) => {
      const btn = e.target.closest('.tag');
      if (!btn) return;
      btn.classList.toggle('on');
    };
    document.getElementById('f-years').onclick = (e) => {
      const btn = e.target.closest('.tag');
      if (!btn) return;
      document.querySelectorAll('#f-years .tag').forEach(el => el.classList.remove('on'));
      btn.classList.add('on');
      selectedYears = btn.dataset.v;
    };
    document.getElementById('btn-submit').onclick = submitApply;
  }

  function submitApply() {
    const name = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const sms = document.getElementById('f-sms').value.trim();
    const city = document.getElementById('f-city').value.trim();
    const cert = document.getElementById('f-cert').value;
    const bio = document.getElementById('f-bio').value.trim();
    const agree = document.getElementById('f-agree').checked;
    const projects = [...document.querySelectorAll('#f-projects .tag.on')].map(el => el.dataset.v);

    if (!name) return toast('请填写姓名');
    if (!phone || !/^1\d{10}$/.test(phone)) return toast('请填写正确的手机号');
    if (!sms || sms !== SMS_CODE || !sentSms) return toast('请填写正确的验证码');
    if (!projects.length) return toast('请选择项目类型');
    if (!city) return toast('请填写城市');
    if (!cert) return toast('请选择教练资质等级');
    if (!selectedYears) return toast('请选择从业年限');
    if (!bio) return toast('请填写详细介绍');
    if (!agree) return toast('请阅读并同意相关协议');

    state.status = 'pending';
    state.application = { name, phone, project_types: projects, city, certification: cert, years_exp: selectedYears, bio, submitted_at: new Date().toLocaleString('zh-CN') };
    previewOverride = null;
    saveState();
    goSubmitted();
  }

  function goSubmitted() {
    currentScreen = 'submitted';
    setNav('提交成功', true);
    document.getElementById('phone-content').innerHTML = `
      <div class="success">
        <div class="success__icon">✓</div>
        <h2>申请信息已提交成功</h2>
        <p>预计 1-3 个工作日完成审核，审核通过后会发送通知告知。</p>
        <button type="button" class="btn-primary" style="margin-top:24px" id="btn-back-profile">返回个人中心</button>
      </div>`;
    document.getElementById('btn-back-profile').onclick = () => { currentScreen = 'profile'; renderProfile(); };
  }

  function renderAdmin() {
    const tbody = document.getElementById('admin-tbody');
    const actions = document.getElementById('admin-actions');
    const app = state.application;
    if (!app) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999">暂无申请</td></tr>';
      actions.innerHTML = '';
      return;
    }
    const statusLabel = { pending: '待审核', approved: '已通过', rejected: '已驳回', none: '—' };
    const badge = state.status === 'approved' ? 'approved' : 'pending';
    tbody.innerHTML = `<tr>
      <td>${app.name}</td><td>${app.phone}</td><td>${(app.project_types || []).join('、')}</td>
      <td><span class="badge badge--${badge}">${statusLabel[state.status] || state.status}</span></td>
    </tr>`;
    if (state.status === 'pending') {
      actions.innerHTML = `
        <button type="button" class="btn-sm btn-sm--ok" id="adm-approve">批准</button>
        <button type="button" class="btn-sm btn-sm--danger" id="adm-reject">驳回</button>`;
      document.getElementById('adm-approve').onclick = () => {
        state.status = 'approved';
        previewOverride = null;
        saveState();
        toast('已批准 · 请查看左侧个人中心');
        if (currentScreen === 'profile') renderProfile();
      };
      document.getElementById('adm-reject').onclick = () => {
        state.status = 'none';
        state.application = null;
        previewOverride = null;
        saveState();
        toast('已驳回');
        if (currentScreen === 'profile') renderProfile();
      };
    } else {
      actions.innerHTML = '<span style="font-size:13px;color:#5c6c7a">当前无待审核项</span>';
    }
  }

  document.getElementById('nav-back').onclick = () => {
    currentScreen = 'profile';
    renderProfile();
  };

  document.getElementById('phone-tabbar').onclick = (e) => {
    const btn = e.target.closest('button[data-screen]');
    if (!btn) return;
    document.querySelectorAll('#phone-tabbar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.screen === 'profile') {
      currentScreen = 'profile';
      renderProfile();
    } else {
      setNav({ home: '首页', heroes: '英雄广场', mall: '商城' }[btn.dataset.screen] || '页面', false);
      document.getElementById('phone-content').innerHTML = '<div style="padding:40px 16px;text-align:center;color:#999;font-size:14px">本演示仅展示「我的」与申请审核流程</div>';
    }
  };

  document.getElementById('btn-reset').onclick = () => {
    if (!confirm('清空演示数据？')) return;
    state = { status: 'none', application: null };
    previewOverride = null;
    localStorage.removeItem(STORAGE_KEY);
    currentScreen = 'profile';
    renderProfile();
    renderAdmin();
    toast('已重置');
  };

  renderProfile();
  renderAdmin();
})();
  </script>
</body>
</html>
